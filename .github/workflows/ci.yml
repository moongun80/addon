name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxinput-dev libxtst-dev
      
      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # macOS SDK includes needed frameworks
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build core
        run: cargo build -p addon-core --release
      
      - name: Test core
        run: cargo test -p addon-core
      
      - name: Build OS adapters
        run: |
          cargo build -p addon-macos --no-default-features --features macos || echo "macos adapter: skipped"
          cargo build -p addon-windows --no-default-features --features windows || echo "windows adapter: skipped"
          cargo build -p addon-linux --no-default-features --features linux || echo "linux adapter: skipped"
      
      - name: Build daemon
        run: cargo build -p addon-daemon --release
      
      - name: Check formatting
        run: cargo fmt --all --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
